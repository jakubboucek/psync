# Repeatable test environment for psync.
#
#   server – "remote": agent over HTTP on real PHP 7.4 + Apache (legacy hosting)
#   client – PHP 8.4 CLI, `psync` is called from here
#
# Usage:
#   docker compose up -d
#   docker compose exec client php bin/psync <command>
#
# Shared hosting limits are simulated by a mounted php.ini (tests/docker/limits.ini).

services:
  server:
    image: jakubboucek/lamp-devstack-php:7.4-legacy
    ports:
      - "8088:80"
    environment:
      TZ: Europe/Prague
      APACHE_DOCUMENT_ROOT: /var/www/html/remote
    volumes:
      - ./tests/remote:/var/www/html/remote
      - ./tests/docker/limits.ini:/usr/local/etc/php/conf.d/zz-psync-limits.ini:ro

  client:
    image: jakubboucek/lamp-devstack-php:8.4-cli
    working_dir: /app
    depends_on:
      - server
    environment:
      TZ: Europe/Prague
      # Inside the compose network the server is reachable at hostname `server`.
      PSYNC_AGENT_URL: http://server/agent.php
    volumes:
      - .:/app
    command: sleep infinity
