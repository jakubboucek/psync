; Simulation of hard shared hosting limits for testing batching and resumability.
post_max_size = 4M
upload_max_filesize = 4M
max_file_uploads = 20
memory_limit = 64M
max_execution_time = 15
; Transparent server gzip – the agent is supposed to disable it at runtime; we set Off as the default here.
zlib.output_compression = Off
