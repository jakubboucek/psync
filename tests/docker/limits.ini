; Simulace tvrdých limitů sdíleného hostingu pro testování dávkování a resumability.
post_max_size = 4M
upload_max_filesize = 4M
max_file_uploads = 20
memory_limit = 64M
max_execution_time = 15
; Transparentní gzip serveru – agent ho má za běhu vypnout; sem dáme Off jako default.
zlib.output_compression = Off
