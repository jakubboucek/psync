; Varianta s vynucenou transparentní kompresí serveru – test, že ji agent za
; běhu vypne a nedochází ke dvojí kompresi.
; Použij dočasným přepnutím mountu v docker-compose.yml na tento soubor.
post_max_size = 4M
upload_max_filesize = 4M
max_file_uploads = 20
memory_limit = 64M
max_execution_time = 15
zlib.output_compression = On
