; Variant with forced transparent server compression – a test that the agent disables it at
; runtime and that double compression does not occur.
; Use it by temporarily switching the mount in docker-compose.yml to this file.
post_max_size = 4M
upload_max_filesize = 4M
max_file_uploads = 20
memory_limit = 64M
max_execution_time = 15
zlib.output_compression = On
